<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTRADE | Платформа Дропшипінгу</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }
        .aside-open { transform: translateX(0) !important; }
        .cart-open { transform: translateX(0) !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .vendor-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .page-btn.active { background: #0f172a; color: white; }
        /* Стилізація опису з XML */
        .description-content ul { list-style-type: disc; padding-left: 20px; margin-bottom: 10px; }
        .description-content p { margin-bottom: 10px; }
    </style>
</head>
<body class="antialiased text-slate-900">

<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
    <div class="max-w-[1600px] mx-auto px-4 h-20 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fa-solid fa-bolt text-xl"></i>
            </div>
            <div class="hidden sm:block">
                <h1 class="font-black text-xl tracking-tighter leading-none italic uppercase">UTRADE</h1>
                <p class="text-[10px] font-bold text-blue-600 tracking-widest uppercase">Дроп-платформа</p>
            </div>
        </div>

        <div class="flex-1 max-w-xl relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" oninput="performSearch()" placeholder="Пошук товару або ID..." 
                   class="w-full bg-slate-100 border-none rounded-2xl pl-11 pr-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-3 text-slate-400">
                <a href="viber://chat?number=%2B380666172764" class="hover:text-blue-600"><i class="fa-brands fa-viber text-xl"></i></a>
                <a href="https://t.me/your_bot" class="hover:text-blue-400"><i class="fa-brands fa-telegram text-xl"></i></a>
            </div>
            <button onclick="toggleMobileAside(true)" class="lg:hidden w-11 h-11 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fa-solid fa-filter"></i></button>
            <button onclick="toggleCart(true)" class="w-11 h-11 bg-slate-900 text-white rounded-xl flex items-center justify-center relative">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
            </button>
        </div>
    </div>
</nav>

<div class="max-w-[1600px] mx-auto px-4 py-6">
    <div class="mb-8 overflow-x-auto pb-2 flex gap-3 no-scrollbar" id="vendorBar"></div>

    <div class="flex flex-col lg:flex-row gap-8">
        <aside id="sidePanel" class="fixed lg:sticky lg:top-24 top-0 left-0 h-full lg:h-fit w-72 bg-white lg:bg-transparent z-[70] p-6 lg:p-0 -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="lg:bg-white lg:p-6 lg:rounded-[2.5rem] lg:shadow-sm border-slate-100 space-y-6">
                <div class="flex justify-between items-center lg:hidden mb-4">
                    <span class="font-black italic uppercase">Категорії</span>
                    <button onclick="toggleMobileAside(false)"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Пошук категорії</label>
                    <input type="text" id="catSearch" oninput="filterCategoriesList()" placeholder="Назва..." class="w-full bg-slate-100 border-none rounded-xl px-4 py-2 text-xs mb-3 focus:ring-1 focus:ring-blue-500">
                    <div id="categoryList" class="max-h-[50vh] overflow-y-auto custom-scrollbar space-y-1 pr-2"></div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Ціна (₴)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" oninput="performSearch()" placeholder="Від" class="w-1/2 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold italic">
                        <input type="number" id="maxPrice" oninput="performSearch()" placeholder="До" class="w-1/2 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold italic">
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1">
            <div id="loader" class="flex flex-col items-center py-20 text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest italic animate-pulse">Синхронізація складу...</p>
            </div>
            
            <div id="productGrid"></div>
            <div id="pagination" class="mt-12 flex flex-wrap items-center justify-center gap-2 pb-10"></div>
        </main>
    </div>
</div>

<div id="cartOverlay" onclick="toggleCart(false)" class="fixed inset-0 bg-slate-900/50 z-[100] hidden backdrop-blur-sm"></div>
<div id="cartSidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[110] translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
    <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-xl font-black italic uppercase tracking-tighter">Кошик</h2>
        <button onclick="toggleCart(false)" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 custom-scrollbar"></div>
    <div class="p-6 border-t bg-white">
        <div id="totalProfit" class="text-[10px] font-black text-green-600 mb-4 uppercase italic text-center bg-green-50 py-2 rounded-xl">ПРИБУТОК: 0 ₴</div>
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-black text-slate-400 uppercase italic">Разом:</span>
            <span id="cartTotal" class="text-3xl font-black text-slate-900 tracking-tighter">0 ₴</span>
        </div>
        <button onclick="checkoutViaViber()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl flex items-center justify-center gap-3 hover:bg-blue-600 transition-all">
            <i class="fa-brands fa-viber text-xl"></i> ОФОРМИТИ В VIBER
        </button>
    </div>
</div>

<div id="productModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
    <div class="bg-white w-full max-w-5xl rounded-[2.5rem] overflow-hidden relative max-h-[90vh] flex flex-col md:flex-row">
        <button onclick="closeModal()" class="absolute top-5 right-5 w-10 h-10 bg-white shadow-lg rounded-full flex items-center justify-center z-10"><i class="fa-solid fa-xmark"></i></button>
        <div id="modalContent" class="flex flex-col md:flex-row w-full h-full overflow-y-auto md:overflow-visible"></div>
    </div>
</div>

<script>
    let allProducts = [], categories = [], cart = JSON.parse(localStorage.getItem('utrade_v8')) || [];
    let currentVendor = 'all', currentCategory = 'all', currentPage = 1, itemsPerPage = 20;

    // ВИПРАВЛЕНА ЛОГІКА ПОСТАЧАЛЬНИКІВ
    const getVendorName = (url) => {
        if (!url) return "UTRADE";
        const lowUrl = url.toLowerCase();
        
        if (lowUrl.includes("images.ua.prom.st") || lowUrl.includes("prom.ua")) return "SHKATULKA";
        if (lowUrl.includes("opt-drop")) return "OPT-DROP";
        if (lowUrl.includes("hugo")) return "HUGO";
        if (lowUrl.includes("kievopt")) return "KIEVOPT";
        if (lowUrl.includes("feed")) return "FEED";
        
        try {
            const host = new URL(url).hostname.replace('www.', '').split('.')[0].toUpperCase();
            return host || "UTRADE";
        } catch(e) { return "UTRADE"; }
    };

    function toggleMobileAside(show) { document.getElementById('sidePanel').classList.toggle('aside-open', show); }
    function toggleCart(show) { 
        document.getElementById('cartSidebar').classList.toggle('cart-open', show); 
        document.getElementById('cartOverlay').classList.toggle('hidden', !show);
    }
    function closeModal() { document.getElementById('productModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }

    async function init() {
        try {
            const res = await fetch('Masterevanew.xml');
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");

            const catNodes = xml.getElementsByTagName('category');
            categories = Array.from(catNodes).map(c => ({ id: c.getAttribute('id'), name: c.textContent.trim() }));

            const offers = xml.getElementsByTagName('offer');
            allProducts = Array.from(offers).map(o => {
                const img = o.getElementsByTagName('picture')[0]?.textContent || "";
                return {
                    id: o.getAttribute('id'),
                    name: (o.getElementsByTagName('name_ua')[0]?.textContent || o.getElementsByTagName('name')[0]?.textContent || "Без назви").toUpperCase(),
                    price: Math.round(parseFloat(o.getElementsByTagName('price')[0]?.textContent || 0)),
                    img: img,
                    vendor: getVendorName(img),
                    catId: o.getElementsByTagName('categoryId')[0]?.textContent,
                    // ПРАВИЛЬНИЙ ПАРСИНГ ОПИСУ
                    desc: o.getElementsByTagName('description')[0]?.textContent || "Опис відсутній"
                };
            });

            renderVendorBar();
            renderCategoriesList();
            performSearch();
            updateCartUI();
            document.getElementById('loader').classList.add('hidden');
        } catch (e) {
            document.getElementById('loader').innerHTML = '<p class="text-red-500 font-black italic">ПОМИЛКА XML</p>';
        }
    }

    function renderVendorBar() {
        const vendors = ['all', ...new Set(allProducts.map(p => p.vendor))];
        document.getElementById('vendorBar').innerHTML = vendors.map(v => `
            <button onclick="filterByVendor('${v}')" class="vendor-btn shrink-0 px-6 py-2.5 rounded-full border border-slate-200 text-[10px] font-black uppercase italic tracking-wider transition-all ${currentVendor === v ? 'active shadow-lg' : 'bg-white hover:border-blue-400'}">
                ${v === 'all' ? 'Всі постачальники' : v}
            </button>
        `).join('');
    }

    function filterByVendor(v) {
        currentVendor = v; currentCategory = 'all'; currentPage = 1;
        renderVendorBar(); renderCategoriesList(); performSearch();
    }

    function renderCategoriesList() {
        const list = document.getElementById('categoryList');
        list.innerHTML = `
            <button onclick="selectCategory('all')" class="w-full text-left px-4 py-2 rounded-lg text-xs font-bold italic transition-all ${currentCategory === 'all' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'}">Всі категорії</button>
            ${categories.map(c => `
                <button onclick="selectCategory('${c.id}')" class="category-item w-full text-left px-4 py-2 rounded-lg text-xs font-bold italic transition-all ${currentCategory === c.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-100 text-slate-500'}">
                    ${c.name}
                </button>
            `).join('')}
        `;
    }

    function selectCategory(id) {
        currentCategory = id; currentPage = 1;
        renderCategoriesList(); performSearch();
        if(window.innerWidth < 1024) toggleMobileAside(false);
    }

    function filterCategoriesList() {
        const q = document.getElementById('catSearch').value.toLowerCase();
        document.querySelectorAll('.category-item').forEach(b => b.classList.toggle('hidden', !b.textContent.toLowerCase().includes(q)));
    }

    function performSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const minP = parseFloat(document.getElementById('minPrice').value) || 0;
        const maxP = parseFloat(document.getElementById('maxPrice').value) || 999999;

        const filtered = allProducts.filter(p => {
            const mV = currentVendor === 'all' || p.vendor === currentVendor;
            const mC = currentCategory === 'all' || p.catId === currentCategory;
            const mQ = p.name.toLowerCase().includes(q) || p.id.includes(q);
            const mP = p.price >= minP && p.price <= maxP;
            return mV && mC && mQ && mP;
        });

        const start = (currentPage - 1) * itemsPerPage;
        renderGrid(filtered.slice(start, start + itemsPerPage));
        renderPagination(Math.ceil(filtered.length / itemsPerPage));
    }

    function renderGrid(list) {
        const grid = document.getElementById('productGrid');
        if(!list.length) { grid.innerHTML = '<div class="text-center py-20 font-black text-slate-300 italic uppercase">Товари не знайдено</div>'; return; }

        grid.className = "grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4";
        grid.innerHTML = list.map(p => `
            <div class="bg-white p-3 rounded-[2.5rem] border border-slate-100 product-card cursor-pointer flex flex-col h-full" onclick="openModal('${p.id}')">
                <div class="aspect-square bg-slate-50 rounded-[2rem] mb-4 flex items-center justify-center p-4 relative overflow-hidden">
                    <img src="${p.img}" class="max-w-full max-h-full object-contain mix-blend-multiply" loading="lazy">
                    <span class="absolute top-4 left-4 bg-white/90 px-2 py-1 rounded-full text-[7px] font-black italic border border-slate-100 uppercase">${p.vendor}</span>
                </div>
                <h3 class="px-2 text-[11px] font-bold text-slate-800 line-clamp-2 h-8 leading-tight mb-4 italic uppercase">${p.name}</h3>
                <div class="mt-auto px-2 pb-2 flex justify-between items-center" onclick="event.stopPropagation()">
                    <span class="text-lg font-black italic tracking-tighter">${p.price} ₴</span>
                    <button onclick="addToCart('${p.id}')" class="w-10 h-10 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all active:scale-90"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        const p = allProducts.find(x => x.id === id);
        if(!p) return;
        
        // Вставляємо опис як innerHTML для підтримки тегів з XML
        document.getElementById('modalContent').innerHTML = `
            <div class="w-full md:w-1/2 bg-slate-50 p-8 flex items-center justify-center relative">
                <img src="${p.img}" class="max-w-full max-h-[500px] object-contain mix-blend-multiply drop-shadow-2xl">
            </div>
            <div class="w-full md:w-1/2 p-8 flex flex-col h-full bg-white overflow-y-auto custom-scrollbar">
                <div class="mb-6">
                    <span class="text-[10px] font-black text-blue-600 uppercase italic bg-blue-50 px-3 py-1 rounded-full">ID: ${p.id} | ${p.vendor}</span>
                    <h2 class="text-2xl font-black text-slate-900 leading-tight italic uppercase mt-4">${p.name}</h2>
                </div>
                <div class="text-4xl font-black text-slate-900 mb-8 italic">${p.price} ₴</div>
                
                <div class="space-y-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase italic tracking-widest">Опис та характеристики</label>
                    <div class="text-sm text-slate-600 leading-relaxed description-content">
                        ${p.desc}
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t flex gap-4">
                    <button onclick="addToCart('${p.id}'); closeModal();" class="flex-1 py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all uppercase italic">До кошика</button>
                </div>
            </div>`;
        document.getElementById('productModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function renderPagination(total) {
        const w = document.getElementById('pagination');
        if(total <= 1) { w.innerHTML = ''; return; }
        let h = '';
        for(let i = 1; i <= total; i++) {
            if (i === 1 || i === total || (i >= currentPage - 1 && i <= currentPage + 1)) {
                h += `<button onclick="currentPage=${i}; performSearch(); window.scrollTo(0,0);" class="page-btn w-10 h-10 rounded-xl text-xs font-black italic transition-all ${currentPage === i ? 'active shadow-lg' : 'bg-white border border-slate-100'}">${i}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                h += `<span class="text-slate-300 font-black">...</span>`;
            }
        }
        w.innerHTML = h;
    }

    // Кошик (залишається без змін у логіці, але перевірте функцію збереження)
    function addToCart(id) {
        const item = cart.find(i => i.id === id);
        if(item) item.count++;
        else {
            const p = allProducts.find(x => x.id === id);
            cart.push({...p, salePrice: Math.round(p.price * 1.2), count: 1}); // Націнка за замовчуванням 20%
        }
        saveCart(); updateCartUI(); toggleCart(true);
    }

    function saveCart() { localStorage.setItem('utrade_v8', JSON.stringify(cart)); }
    
    function updateCartUI() {
        const items = document.getElementById('cartItems');
        let total = 0, profit = 0;
        items.innerHTML = cart.length ? cart.map(p => {
            const pProfit = (p.salePrice - p.price) * p.count;
            total += (p.salePrice * p.count);
            profit += pProfit;
            return `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 relative">
                    <button onclick="removeFromCart('${p.id}')" class="absolute top-4 right-4 text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    <div class="flex gap-4 items-center mb-4 pr-6">
                        <img src="${p.img}" class="w-12 h-12 object-contain bg-slate-50 rounded-xl">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[10px] font-black truncate uppercase italic">${p.name}</h4>
                            <p class="text-[9px] text-slate-400 font-bold">ЗАКУП: ${p.price} ₴</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-2xl text-center">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase italic mb-1">Ціна продажу</p>
                            <input type="number" value="${p.salePrice}" oninput="inlineUpdate('${p.id}', this.value)" class="w-full bg-white px-2 py-1 rounded-xl text-xs font-black border-none text-center focus:ring-1 focus:ring-blue-400">
                        </div>
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase italic mb-1">К-сть</p>
                            <div class="flex items-center justify-center gap-3 text-xs font-black bg-white py-1 rounded-xl">
                                <button onclick="updateCount('${p.id}', -1)"><i class="fa-solid fa-minus text-[8px]"></i></button>
                                <span>${p.count}</span>
                                <button onclick="updateCount('${p.id}', 1)"><i class="fa-solid fa-plus text-[8px]"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('') : '<div class="py-20 text-center opacity-20 font-black italic uppercase">Порожньо</div>';
        
        document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.count, 0);
        document.getElementById('cartCount').classList.toggle('hidden', !cart.length);
        document.getElementById('cartTotal').textContent = total + ' ₴';
        document.getElementById('totalProfit').textContent = `ПРИБУТОК: ${profit} ₴`;
    }

    function inlineUpdate(id, val) {
        const p = cart.find(i => i.id === id); if(p) { p.salePrice = parseInt(val) || 0; saveCart(); updateCartUI(); }
    }
    function updateCount(id, d) {
        const p = cart.find(i => i.id === id); if(p) { p.count = Math.max(1, p.count + d); saveCart(); updateCartUI(); }
    }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveCart(); updateCartUI(); }

    function checkoutViaViber() {
        if(!cart.length) return;
        let msg = `🚀 НОВЕ ЗАМОВЛЕННЯ 🚀\n\n`;
        cart.forEach(p => msg += `📦 ${p.name}\nК-сть: ${p.count} шт.\nЦіна продажу: ${p.salePrice} ₴\n--------\n`);
        window.open(`viber://chat?number=%2B380666172764&draft=${encodeURIComponent(msg)}`);
    }

    init();
</script>
</body>
</html>
