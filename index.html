<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrade | Дроп-платформа №1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .product-card:hover img { transform: scale(1.05); }
        .cart-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; }
        .pagination-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .contact-link:hover .fa-viber { color: #7360f2; }
        .contact-link:hover .fa-telegram { color: #0088cc; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass shadow-sm px-4 py-3 border-b border-slate-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight leading-none">UTRADE</h1>
                    <span class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Дроп-платформа</span>
                </div>
            </div>

            <div class="flex items-center gap-4 bg-white/50 px-4 py-2 rounded-2xl border border-slate-100">
                <a href="tel:+380666172764" class="text-sm font-extrabold text-slate-700 hover:text-blue-600 transition-colors">
                    +38 066 617 27 64
                </a>
                <div class="h-4 w-[1px] bg-slate-200"></div>
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase hidden md:block">Напишіть нам:</span>
                    <a href="viber://chat?number=+380666172764" class="contact-link text-slate-400 transition-transform hover:scale-110">
                        <i class="fa-brands fa-viber text-xl"></i>
                    </a>
                    <a href="https://t.me/+380666172764" target="_blank" class="contact-link text-slate-400 transition-transform hover:scale-110">
                        <i class="fa-brands fa-telegram text-xl"></i>
                    </a>
                </div>
            </div>
            
            <button onclick="toggleCart()" class="relative p-3 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all duration-300 shadow-lg shadow-slate-200">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <div id="cartCount" class="cart-badge hidden">0</div>
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-1/4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 sticky top-24">
                    <h2 class="font-extrabold text-lg mb-6 text-slate-800 italic">Налаштування</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Пошук</label>
                            <input type="text" id="searchInput" placeholder="Назва, ID..." class="w-full p-3 bg-slate-50 border rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Категорія</label>
                            <select id="categoryFilter" class="w-full p-3 bg-slate-50 border rounded-2xl outline-none text-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Показувати по</label>
                            <select id="perPage" class="w-full p-3 bg-slate-50 border rounded-2xl outline-none text-sm font-bold">
                                <option value="20">20 товарів</option>
                                <option value="50">50 товарів</option>
                                <option value="100">100 товарів</option>
                            </select>
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Макс. ціна</label>
                                <span class="text-sm font-extrabold text-blue-600"><span id="priceLabel">0</span> ₴</span>
                            </div>
                            <input type="range" id="priceFilter" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>
                </div>
            </aside>

            <main class="w-full lg:w-3/4 flex flex-col" id="mainScrollPoint">
                <div id="results" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                <div id="loader" class="flex justify-center py-20 text-blue-600"><i class="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>
                <div id="paginationContainer" class="mt-12 mb-8 flex flex-wrap justify-center gap-2 hidden"></div>
            </main>
        </div>
    </div>

    <script>
        // Копіюйте логіку JavaScript з попередньої відповіді сюди
        // Не забудьте додати функцію sendOrder, яка використовує ваш номер!
    </script>
</body>
</html>
