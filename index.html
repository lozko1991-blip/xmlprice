    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }

        .page-btn.active { background: #0f172a; color: white; }
    </style>
</head>

        </div>

        <div class="hidden lg:flex items-center gap-4 px-6 border-x border-slate-100">
            <a href="tel:+380666172764" class="text-xs font-black text-slate-600 hover:text-blue-600 transition-colors flex items-center gap-2">
                <i class="fa-solid fa-phone text-blue-500"></i> +380666172764
            </a>
            <div class="flex gap-2">
                <a href="viber://chat?number=%2B380666172764" class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all"><i class="fa-brands fa-viber text-sm"></i></a>
                <a href="https://t.me/+380666172764" class="w-8 h-8 rounded-lg bg-sky-50 text-sky-600 flex items-center justify-center hover:bg-sky-600 hover:text-white transition-all"><i class="fa-brands fa-telegram text-sm"></i></a>

            <button onclick="toggleMobileAside(true)" class="lg:hidden w-11 h-11 bg-slate-100 rounded-xl flex items-center justify-center"><i class="fa-solid fa-filter"></i></button>

                <i class="fa-solid fa-bag-shopping"></i>

</nav>

<div class="max-w-[1600px] mx-auto px-4 py-6">
    <div class="mb-8 overflow-x-auto pb-2 flex gap-3 no-scrollbar" id="vendorBar">
        <button onclick="filterByVendor('all')" class="vendor-btn active shrink-0 px-6 py-2.5 rounded-full border border-slate-200 text-xs font-black uppercase italic tracking-wider transition-all">Всі постачальники</button>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <aside id="sidePanel" class="fixed lg:sticky lg:top-24 top-0 left-0 h-full lg:h-fit w-72 bg-white lg:bg-transparent z-[70] p-6 lg:p-0 -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="lg:bg-white lg:p-6 lg:rounded-[2.5rem] lg:shadow-sm border-slate-100 space-y-6">
                <div class="flex justify-between items-center lg:hidden">
                    <span class="font-black italic">ФІЛЬТРИ</span>
                    <button onclick="toggleMobileAside(false)"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Категорія</label>
                    <input type="text" id="catSearch" oninput="filterCategoriesList()" placeholder="Пошук категорії..." class="w-full bg-slate-100 border-none rounded-xl px-4 py-2 text-xs mb-3 focus:ring-1 focus:ring-blue-500">
                    <div id="categoryList" class="max-h-60 overflow-y-auto custom-scrollbar space-y-1">
                        </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block italic">Діапазон ціни</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" oninput="performSearch()" placeholder="Від" class="w-1/2 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold italic">
                        <input type="number" id="maxPrice" oninput="performSearch()" placeholder="До" class="w-1/2 bg-slate-100 border-none rounded-xl p-3 text-xs font-bold italic">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block italic">На сторінці</label>
                    <select id="limitSelect" onchange="performSearch()" class="w-full bg-slate-100 border-none rounded-xl p-3 text-xs font-bold italic">
                        <option value="20">20 товарів</option>
                        <option value="50">50 товарів</option>
                        <option value="100">100 товарів</option>
                    </select>
                </div>
            </div>
        </aside>

        <main class="flex-1">
            <div id="loader" class="flex flex-col items-center py-20">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse italic">Синхронізація складу...</p>
            </div>
            
            <div id="productGrid" class="space-y-12"></div>

            <div id="pagination" class="mt-12 flex flex-wrap items-center justify-center gap-2 pb-10"></div>
        </main>
    </div>
</div>

<div id="cartOverlay" onclick="toggleCart(false)" class="fixed inset-0 bg-slate-900/50 z-[100] hidden backdrop-blur-sm"></div>
<div id="cartSidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[110] translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
    <div class="p-6 border-b flex justify-between items-center bg-white">
        <h2 class="text-xl font-black italic uppercase tracking-tighter">Кошик <span class="text-blue-600">UTRADE</span></h2>
        <button onclick="toggleCart(false)" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 custom-scrollbar"></div>
    <div class="p-6 border-t bg-white shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
        <div id="totalProfit" class="text-[10px] font-black text-green-600 mb-4 uppercase italic text-center bg-green-50 py-2 rounded-xl"></div>
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Разом до сплати:</span>
            <span id="cartTotal" class="text-3xl font-black text-slate-900 tracking-tighter">0 ₴</span>
        </div>
        <button onclick="checkoutViaViber()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl flex items-center justify-center gap-3 hover:bg-blue-600 transition-all shadow-lg active:scale-95">
            <i class="fa-brands fa-viber text-xl"></i> ОФОРМИТИ В VIBER
        </button>
    </div>
</div>

<div id="productModal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
    <div class="bg-white w-full max-w-4xl rounded-[2.5rem] overflow-hidden relative max-h-[95vh] flex flex-col md:flex-row shadow-2xl">
        <button onclick="closeModal()" class="absolute top-5 right-5 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-lg z-10 hover:rotate-90 transition-all hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
        <div id="modalContent" class="flex flex-col md:flex-row w-full h-full overflow-y-auto md:overflow-hidden"></div>
    </div>
</div>

<script>
    let allProducts = [], categories = [], cart = JSON.parse(localStorage.getItem('utrade_cart_6.0')) || [];
    let currentVendor = 'all', currentCategory = 'all', currentPage = 1;

    const getVendor = (url) => {
        if (!url) return "UTRADE";
        if (url.includes("prom.ua") || url.includes("images.ua.prom.st")) return "HUGO";
        try { return new URL(url).hostname.replace('www.', '').split('.')[0].toUpperCase(); } catch(e) { return "UTRADE"; }
    };

    function toggleMobileAside(show) { document.getElementById('sidePanel').classList.toggle('aside-open', show); }
    function toggleCart(show) { 
        document.getElementById('cartSidebar').classList.toggle('cart-open', show); 
        document.getElementById('cartOverlay').classList.toggle('hidden', !show);
    }
    function closeModal() { 
        document.getElementById('productModal').classList.add('hidden'); 
        document.body.style.overflow = 'auto'; 
    }

    async function init() {
        updateCartUI();
        try {
            const res = await fetch('Masterevanew.xml');
            const xml = new DOMParser().parseFromString(await res.text(), "text/xml");

            const catNodes = xml.getElementsByTagName('category');
            categories = Array.from(catNodes).map(c => ({
                id: c.getAttribute('id'), name: c.textContent.trim()
            }));

            const offers = xml.getElementsByTagName('offer');
            allProducts = Array.from(offers).map(o => {
                const img = o.getElementsByTagName('picture')[0]?.textContent || "";
                return {
                    id: o.getAttribute('id'),
                    name: (o.getElementsByTagName('name_ua')[0]?.textContent || o.getElementsByTagName('name')[0]?.textContent || "").toUpperCase(),
                    price: Math.round(parseFloat(o.getElementsByTagName('price')[0]?.textContent || 0)),
                    img: img,
                    vendor: getVendor(img),
                    catId: o.getElementsByTagName('categoryId')[0]?.textContent,
                    stock: o.getElementsByTagName('stock_quantity')[0]?.textContent || "є",
                    desc: o.getElementsByTagName('description')[0]?.textContent.trim() || "",
                    params: Array.from(o.getElementsByTagName('param')).map(p => ({
                        name: p.getAttribute('name'), val: p.textContent.trim()
                    })).filter(p => p.val !== "")
                };
            });

            renderVendorBar();
            performSearch();
            document.getElementById('loader').classList.add('hidden');

        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerHTML = '<p class="text-red-500 font-black italic">ПОМИЛКА ЗАВАНТАЖЕННЯ СКЛАДУ</p>';
        }
    }

    function renderVendorBar() {
        const vendors = ['all', ...new Set(allProducts.map(p => p.vendor))];
        document.getElementById('vendorBar').innerHTML = vendors.map(v => `
            <button onclick="filterByVendor('${v}')" class="vendor-btn shrink-0 px-6 py-2.5 rounded-full border border-slate-200 text-[10px] font-black uppercase italic tracking-wider transition-all ${currentVendor === v ? 'active' : ''}">
                ${v === 'all' ? 'Всі постачальники' : v}
            </button>
        `).join('');
    }

    function filterByVendor(v) {
        currentVendor = v;
        currentCategory = 'all';
        currentPage = 1;
        renderVendorBar();
        renderCategoriesList();
        performSearch();
    }

    function renderCategoriesList() {
        const vendorProducts = currentVendor === 'all' ? allProducts : allProducts.filter(p => p.vendor === currentVendor);
        const activeCatIds = new Set(vendorProducts.map(p => p.catId));
        const filteredCats = categories.filter(c => activeCatIds.has(c.id));

        const list = document.getElementById('categoryList');
        list.innerHTML = `
            <button onclick="selectCategory('all')" class="w-full text-left px-4 py-2 rounded-lg text-xs font-bold italic transition-all ${currentCategory === 'all' ? 'bg-blue-50 text-blue-600' : 'hover:bg-slate-50 text-slate-500'}">Всі категорії</button>
            ${filteredCats.map(c => `
                <button onclick="selectCategory('${c.id}')" class="category-item w-full text-left px-4 py-2 rounded-lg text-xs font-bold italic transition-all ${currentCategory === c.id ? 'bg-blue-50 text-blue-600' : 'hover:bg-slate-50 text-slate-500'}">
                    ${c.name}
                </button>
            `).join('')}
        `;
    }

    function selectCategory(id) { currentCategory = id; currentPage = 1; renderCategoriesList(); performSearch(); }

    function filterCategoriesList() {
        const query = document.getElementById('catSearch').value.toLowerCase();
        document.querySelectorAll('.category-item').forEach(btn => {
            btn.classList.toggle('hidden', !btn.textContent.toLowerCase().includes(query));
        });
    }

    function performSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const minP = parseFloat(document.getElementById('minPrice').value) || 0;
        const maxP = parseFloat(document.getElementById('maxPrice').value) || 999999;
        const limit = parseInt(document.getElementById('limitSelect').value);

        const filtered = allProducts.filter(p => {
            const matchesVendor = currentVendor === 'all' || p.vendor === currentVendor;
            const matchesCat = currentCategory === 'all' || p.catId === currentCategory;
            const matchesQuery = p.name.toLowerCase().includes(query) || p.id.includes(query);
            const matchesPrice = p.price >= minP && p.price <= maxP;
            return matchesVendor && matchesCat && matchesQuery && matchesPrice;
        });

        const totalPages = Math.ceil(filtered.length / limit);
        const start = (currentPage - 1) * limit;
        renderGrid(filtered.slice(start, start + limit));
        renderPagination(totalPages);
    }

    function renderGrid(list) {
        const grid = document.getElementById('productGrid');
        if(!list.length) { grid.innerHTML = '<div class="text-center py-20 font-black text-slate-300 italic uppercase">Нічого не знайдено</div>'; return; }

        const sections = [
            { title: "🔥 ТОП ТОВАРИ", items: list.slice(0, 4) },
            { title: "⚡️ ВИБІР КОРИСТУВАЧІВ", items: list.slice(4) }
        ];

        grid.innerHTML = sections.map(s => s.items.length ? `
            <div>
                <h2 class="flex items-center gap-4 text-[10px] font-black text-slate-400 italic mb-6 tracking-[0.2em] uppercase after:h-[1px] after:bg-slate-100 after:flex-1">${s.title}</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                    ${s.items.map(p => `
                        <div class="bg-white p-3 rounded-[2.5rem] border border-slate-100 product-card cursor-pointer flex flex-col" onclick="openModal('${p.id}')">
                            <div class="aspect-square bg-slate-50 rounded-[2rem] mb-4 flex items-center justify-center p-3 relative">
                                <img src="${p.img}" class="max-w-full max-h-full object-contain mix-blend-multiply" loading="lazy">
                                <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-2.5 py-1 rounded-full text-[8px] font-black italic shadow-sm border border-slate-100 uppercase">${p.vendor}</span>
                            </div>
                            <h3 class="px-2 text-[11px] font-bold text-slate-800 line-clamp-2 h-8 leading-tight mb-4 italic uppercase">${p.name}</h3>
                            <div class="mt-auto px-2 pb-2 flex justify-between items-center" onclick="event.stopPropagation()">
                                <span class="text-base font-black italic">${p.price} ₴</span>
                                <button onclick="addToCart('${p.id}')" class="w-10 h-10 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all shadow-md active:scale-90"><i class="fa-solid fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        ` : '').join('');
    }

    function renderPagination(total) {
        const wrapper = document.getElementById('pagination');
        if(total <= 1) { wrapper.innerHTML = ''; return; }
        let html = '';
        for(let i = 1; i <= total; i++) {
            if (i === 1 || i === total || (i >= currentPage - 1 && i <= currentPage + 1)) {
                html += `<button onclick="currentPage=${i}; performSearch(); window.scrollTo(0,0);" class="page-btn w-10 h-10 rounded-xl text-xs font-black italic transition-all ${currentPage === i ? 'active shadow-lg' : 'bg-white border border-slate-100 hover:bg-slate-50'}">${i}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                html += `<span class="text-slate-300 font-black">...</span>`;
            }
        }
        wrapper.innerHTML = html;
    }

    function addToCart(id) {
        const item = cart.find(i => i.id === id);
        if(item) item.count++;
        else {
            const p = allProducts.find(x => x.id === id);
            cart.push({...p, salePrice: p.price, count: 1});
        }
        saveCart(); updateCartUI(); toggleCart(true);
