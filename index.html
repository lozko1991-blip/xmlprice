<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrade | Дроп-платформа №1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .product-card:hover img { transform: scale(1.05); }
        .cart-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px rgba(37, 99, 235, 0.3); }
        .description-content img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass shadow-sm px-4 py-3 border-b border-slate-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-bolt text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight leading-none">UTRADE</h1>
                    <span class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Дроп-платформа</span>
                </div>
            </div>
            
            <button onclick="toggleCart()" class="relative p-3 bg-slate-100 text-slate-700 rounded-2xl hover:bg-blue-600 hover:text-white transition-all duration-300">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <div id="cartCount" class="cart-badge hidden">0</div>
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <aside class="w-full lg:w-1/4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 sticky top-24">
                    <h2 class="font-extrabold text-lg mb-6 text-slate-800">Пошук товарів</h2>
                    
                    <div class="space-y-6">
                        <div class="relative">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Назва або артикул..." 
                                class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-400 outline-none transition-all">
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Категорія</label>
                            <select id="categoryFilter" class="w-full p-3.5 bg-slate-50 border border-transparent rounded-2xl outline-none focus:bg-white focus:border-blue-400 transition-all"></select>
                        </div>

                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Бюджет до</label>
                                <span class="text-sm font-extrabold text-blue-600"><span id="priceLabel">0</span> ₴</span>
                            </div>
                            <input type="range" id="priceFilter" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>
            </aside>

            <main class="w-full lg:w-3/4">
                <div id="results" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                <div id="loader" class="flex justify-center py-20 text-blue-600"><i class="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>
            </main>
        </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in duration-300">
            <div class="overflow-y-auto">
                <div class="p-4 flex justify-end sticky top-0 bg-white/80 backdrop-blur z-10">
                    <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 transition"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="p-8 pt-0">
                    <div class="flex flex-col md:flex-row gap-10">
                        <div class="w-full md:w-1/2 bg-slate-50 rounded-[2rem] p-6 border border-slate-100">
                            <img id="modalImg" src="" class="w-full aspect-square object-contain">
                        </div>
                        <div class="flex-1 space-y-6">
                            <span id="modalCategory" class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold uppercase rounded-lg tracking-widest"></span>
                            <h2 id="modalTitle" class="text-3xl font-extrabold text-slate-900 leading-tight"></h2>
                            <div class="flex items-baseline gap-2">
                                <span id="modalPrice" class="text-4xl font-black text-slate-900"></span>
                                <span class="text-xl font-bold text-slate-400">₴</span>
                            </div>
                            <button id="addToCartBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-blue-600 shadow-xl shadow-slate-200 transition-all flex items-center justify-center gap-3 active:scale-95">
                                <i class="fa-solid fa-cart-plus"></i> Додати в кошик
                            </button>
                        </div>
                    </div>
                    <div class="mt-12 space-y-4">
                        <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2 italic">
                            <span class="w-8 h-[2px] bg-blue-500"></span> Опис товару
                        </h3>
                        <div id="modalDesc" class="text-slate-600 leading-relaxed text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-[-20px_0_50px_rgba(0,0,0,0.1)] z-[70] translate-x-full transition-transform duration-500 flex flex-col rounded-l-[3rem]">
        <div class="p-8 border-b flex justify-between items-center">
            <h2 class="text-2xl font-extrabold text-slate-900">Кошик</h2>
            <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
        
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 space-y-6"></div>

        <div id="orderForm" class="p-8 bg-slate-50 border-t border-slate-200 space-y-4 hidden rounded-l-[3rem]">
            <input type="text" id="orderFio" placeholder="ПІБ Отримувача" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
            <input type="text" id="orderPhone" placeholder="Номер телефону" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
            <input type="text" id="orderCity" placeholder="Місто та Відділення" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
            
            <div class="grid grid-cols-2 gap-3">
                <select id="orderDelivery" class="p-4 bg-white border border-slate-200 rounded-2xl text-sm font-semibold">
                    <option>Нова Пошта</option>
                    <option>Укрпошта</option>
                </select>
                <select id="orderPayment" class="p-4 bg-white border border-slate-200 rounded-2xl text-sm font-semibold">
                    <option>Післяплата</option>
                    <option>На карту ФОП</option>
                </select>
            </div>

            <div class="pt-4 flex items-center justify-between">
                <span class="text-slate-400 font-bold uppercase text-xs">Загальна сума</span>
                <span id="orderTotal" class="text-2xl font-black text-blue-600">0 ₴</span>
            </div>
            
            <button onclick="sendOrder()" class="w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-extrabold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-95">
                ОФОРМИТИ ЗАМОВЛЕННЯ
            </button>
        </div>
        
        <div id="cartEmpty" class="flex-1 flex flex-col items-center justify-center text-slate-300 p-10 space-y-4">
            <i class="fa-solid fa-basket-shopping text-6xl"></i>
            <p class="font-bold">Кошик порожній</p>
        </div>
    </div>

    <script>
        let products = [];
        let categories = {};
        let cart = [];
        let maxPrice = 0;

        const VENDOR_MAP = {"1111":"Шкатулка", "2222":"Opt-Drop", "3333":"Lugi", "4444":"Dropom", "5555":"RoyalToys", "6":"KievOpt"};

        async function init() {
            try {
                const res = await fetch('Masterevanew.xml');
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");

                for (let n of xml.getElementsByTagName("category")) {
                    categories[n.getAttribute('id')] = n.textContent;
                }

                for (let o of xml.getElementsByTagName("offer")) {
                    const price = parseFloat(o.getElementsByTagName('price')[0]?.textContent || 0);
                    if (price > maxPrice) maxPrice = price;
                    products.push({
                        id: o.getAttribute('id'),
                        name: o.getElementsByTagName('name_ua')[0]?.textContent || "",
                        price: price,
                        vendor: VENDOR_MAP[o.getAttribute('id').split('_')[0]] || "Utrade Partner",
                        stock: o.getElementsByTagName('stock_quantity')[0]?.textContent || "3",
                        catId: o.getElementsByTagName('categoryId')[0]?.textContent,
                        image: o.getElementsByTagName('picture')[0]?.textContent || '',
                        desc: o.getElementsByTagName('description_ua')[0]?.textContent || ""
                    });
                }
                
                document.getElementById('loader').classList.add('hidden');
                setupFilters();
                render();
            } catch (e) {
                console.error("XML Error");
                document.getElementById('loader').innerHTML = "Помилка завантаження прайсу";
            }
        }

        function setupFilters() {
            const select = document.getElementById('categoryFilter');
            select.innerHTML = '<option value="">Всі категорії</option>';
            Object.keys(categories).sort().forEach(id => {
                select.innerHTML += `<option value="${id}">${categories[id]}</option>`;
            });
            document.getElementById('priceFilter').max = maxPrice;
            document.getElementById('priceFilter').value = maxPrice;
            document.getElementById('priceLabel').textContent = Math.round(maxPrice).toLocaleString();
            
            ['searchInput', 'categoryFilter', 'priceFilter'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    document.getElementById('priceLabel').textContent = Math.round(document.getElementById('priceFilter').value).toLocaleString();
                    render();
                });
            });
        }

        function render() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const price = parseFloat(document.getElementById('priceFilter').value);

            const filtered = products.filter(p => 
                (p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)) && 
                (!cat || p.catId === cat) && 
                p.price <= price
            );
            
            const container = document.getElementById('results');
            container.innerHTML = filtered.slice(0, 42).map(p => `
                <div class="product-card bg-white rounded-[2rem] p-5 border border-slate-100 shadow-sm hover:shadow-2xl hover:shadow-blue-900/5 transition-all duration-500 group flex flex-col h-full">
                    <div onclick="openModal('${p.id}')" class="relative overflow-hidden rounded-[1.5rem] bg-slate-50 aspect-square mb-5 cursor-pointer">
                        <img src="${p.image}" class="w-full h-full object-contain mix-blend-multiply transition duration-700">
                        <div class="absolute inset-0 bg-blue-900/0 group-hover:bg-blue-900/5 transition-colors"></div>
                    </div>
                    <div class="flex-1">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${p.vendor}</p>
                        <h3 onclick="openModal('${p.id}')" class="font-bold text-slate-800 text-sm leading-snug line-clamp-2 cursor-pointer hover:text-blue-600 transition mb-4 h-10">${p.name}</h3>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                        <div class="text-xl font-black text-slate-900">${Math.round(p.price)} ₴</div>
                        <button onclick="addToCart('${p.id}')" class="w-12 h-12 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all duration-300 active:scale-90">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!cart.find(item => item.id === id)) {
                cart.push({...product, sellPrice: product.price + 200});
                updateCartUI();
                if(document.getElementById('cartModal').classList.contains('translate-x-full')) toggleCart();
            }
        }

        function updateCartUI() {
            const count = cart.length;
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartCount').classList.toggle('hidden', count === 0);
            
            const container = document.getElementById('cartItems');
            const empty = document.getElementById('cartEmpty');
            const form = document.getElementById('orderForm');

            if (count === 0) {
                empty.classList.remove('hidden');
                form.classList.add('hidden');
                container.innerHTML = '';
            } else {
                empty.classList.add('hidden');
                form.classList.remove('hidden');
                container.innerHTML = cart.map((item, idx) => `
                    <div class="flex gap-4 items-center bg-white border border-slate-100 p-4 rounded-[1.5rem] shadow-sm relative animate-in slide-in-from-right duration-300">
                        <img src="${item.image}" class="w-16 h-16 object-contain rounded-xl">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-xs font-bold text-slate-800 truncate pr-6">${item.name}</h4>
                            <div class="mt-2 flex items-center gap-2">
                                <input type="number" value="${item.sellPrice}" onchange="updateSellPrice(${idx}, this.value)" 
                                    class="w-20 p-2 bg-slate-50 border-none rounded-xl text-xs font-extrabold text-blue-600 outline-none ring-2 ring-transparent focus:ring-blue-100">
                                <span class="text-[10px] text-slate-400 font-bold uppercase">Ціна продажу</span>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${idx})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>
                `).join('');
            }
            calculateTotal();
        }

        function updateSellPrice(idx, val) { cart[idx].sellPrice = parseFloat(val); calculateTotal(); }
        function removeFromCart(idx) { cart.splice(idx, 1);
