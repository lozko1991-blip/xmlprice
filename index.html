<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTRADE | Платформа Дропшипінгу</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--accent:#2563eb;--green:#10b981;--red:#ef4444;}
[data-theme=dark]{--bg:#0d1117;--surface:#161b22;--surface2:#0d1117;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.bebas{font-family:'Bebas Neue',sans-serif;}

.sk{background:linear-gradient(90deg,var(--border) 25%,var(--surface2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.cscroll::-webkit-scrollbar{width:4px;}
.cscroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
[data-theme=dark] .cscroll::-webkit-scrollbar-thumb{background:#30363d;}
.noscroll{-ms-overflow-style:none;scrollbar-width:none;}
.noscroll::-webkit-scrollbar{display:none;}

.pcard{transition:transform .25s ease,box-shadow .25s ease;background:var(--surface);border:1px solid var(--border);border-radius:1rem;}
.pcard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(37,99,235,.12);}

.vbtn{background:var(--surface);color:var(--text2);border:1px solid var(--border);transition:all .2s;border-radius:999px;padding:.4rem 1rem;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;cursor:pointer;}
.vbtn:hover{border-color:var(--accent);color:var(--accent);}
.vbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 14px rgba(37,99,235,.3);}

.cbtn{color:var(--text2);transition:all .15s;text-align:left;width:100%;border-radius:.5rem;padding:.3rem .6rem;font-size:.68rem;font-weight:700;cursor:pointer;display:block;}
.cbtn:hover:not(.active){background:var(--surface2);}
.cbtn.active{background:var(--accent);color:#fff;}

.pbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:.5rem;width:2rem;height:2rem;font-size:.65rem;font-weight:800;transition:all .15s;cursor:pointer;}
.pbtn.active{background:var(--text);color:#fff;border-color:var(--text);}
.pbtn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

#productModal{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;padding:1rem;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);}
#productModal.open{display:flex;}

.cart-open{transform:translateX(0)!important;}
.aside-open{transform:translateX(0)!important;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f172a;color:#fff;padding:10px 22px;border-radius:999px;font-size:12px;font-weight:800;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
[data-theme=dark] #toast{background:#58a6ff;color:#000;}

.desc-content ul{list-style:disc;padding-left:18px;margin-bottom:8px;}
.desc-content ol{list-style:decimal;padding-left:18px;margin-bottom:8px;}
.desc-content p{margin-bottom:8px;line-height:1.7;}
.desc-content strong,.desc-content b{font-weight:800;}

.ptable tr:nth-child(even) td{background:var(--surface2);}
.ptable td{border-bottom:1px solid var(--border);padding:.4rem .6rem;font-size:.7rem;color:var(--text);}
.ptable td:first-child{color:var(--text2);font-weight:700;width:45%;}

input,select,textarea{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:.65rem;font-family:'Manrope',sans-serif;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--text2);}

.sec-title{font-size:.6rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);}

#checkoutForm{display:none;}
#checkoutForm.open{display:block;}

nav{background:var(--surface);border-bottom:1px solid var(--border);}

.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;overflow:hidden;transition:transform .25s,box-shadow .25s;cursor:pointer;}
.feat-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(37,99,235,.12);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both;}

.tab-btn{padding:.4rem .9rem;font-size:.7rem;font-weight:800;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:not(.active){color:var(--text2);}

#sidePanel{background:var(--surface);}
#cartSidebar{background:var(--surface);}
</style>
</head>
<body data-theme="light">

<div id="toast">✓ Додано до кошика</div>

<!-- ═══ NAV ═══ -->
<nav class="sticky top-0 z-50 backdrop-blur-md">
  <div class="max-w-[1700px] mx-auto px-4 h-16 flex items-center gap-3">

    <!-- Logo -->
    <a href="#" class="flex items-center gap-2.5 shrink-0 no-underline">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shadow-md" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);">
        <i class="fa-solid fa-bolt text-sm"></i>
      </div>
      <div class="hidden sm:block">
        <div class="bebas tracking-widest leading-none" style="font-size:1.4rem;color:var(--text);">UTRADE</div>
        <div class="sec-title" style="margin-top:1px;letter-spacing:.18em;">Дроп-платформа</div>
      </div>
    </a>

    <!-- Search -->
    <div class="flex-1 max-w-lg relative">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs" style="color:var(--text2);"></i>
      <input id="searchInput" type="text" oninput="performSearch()" placeholder="Пошук товару або ID..."
             class="w-full pl-9 pr-3 py-2.5 text-sm">
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-1.5 ml-auto">
      <!-- Viber -->
      <a href="viber://chat?number=%2B380666172764" title="Написати у Viber"
         class="hidden md:flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition-all hover:opacity-80"
         style="background:#7360f2;color:#fff;">
        <i class="fa-brands fa-viber text-sm"></i>
        <span class="hidden lg:inline">Viber</span>
      </a>
      <!-- Telegram -->
      <a href="https://t.me/your_bot" target="_blank" title="Написати у Telegram"
         class="hidden md:flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition-all hover:opacity-80"
         style="background:#29b6f6;color:#fff;">
        <i class="fa-brands fa-telegram text-sm"></i>
        <span class="hidden lg:inline">Telegram</span>
      </a>
      <!-- Theme -->
      <button onclick="toggleTheme()" class="w-9 h-9 rounded-xl flex items-center justify-center transition-all"
              style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);" title="Темна/світла тема">
        <i id="themeIcon" class="fa-solid fa-moon text-sm"></i>
      </button>
      <!-- CSV -->
      <button onclick="exportCSV()" class="hidden sm:flex w-9 h-9 rounded-xl items-center justify-center transition-all hover:text-green-500"
              style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);" title="Завантажити CSV">
        <i class="fa-solid fa-file-arrow-down text-sm"></i>
      </button>
      <!-- Mobile filter -->
      <button onclick="toggleAside(true)" class="lg:hidden w-9 h-9 rounded-xl flex items-center justify-center"
              style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);">
        <i class="fa-solid fa-sliders text-sm"></i>
      </button>
      <!-- Cart -->
      <button onclick="toggleCart(true)" class="w-9 h-9 rounded-xl flex items-center justify-center relative text-white"
              style="background:var(--text);">
        <i class="fa-solid fa-bag-shopping text-sm"></i>
        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[9px] text-white w-4 h-4 rounded-full items-center justify-center border-2 border-white font-bold hidden">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- ═══ PAGE ═══ -->
<div class="max-w-[1700px] mx-auto px-4 py-5">

  <!-- Vendor bar -->
  <div id="vendorBar" class="mb-5 flex gap-2 overflow-x-auto noscroll pb-1"></div>

  <div class="flex gap-5">

    <!-- Aside overlay -->
    <div id="asideOverlay" onclick="toggleAside(false)" class="fixed inset-0 bg-black/50 z-[60] hidden lg:hidden backdrop-blur-sm"></div>

    <!-- ═══ ASIDE ═══ -->
    <aside id="sidePanel" class="fixed lg:sticky lg:top-[72px] top-0 left-0 h-full lg:h-fit w-68 shrink-0 z-[70] -translate-x-full lg:translate-x-0 transition-transform duration-300 lg:rounded-2xl overflow-y-auto lg:overflow-visible"
           style="width:260px;border-right:1px solid var(--border);lg:border:1px solid var(--border);">
      <div class="p-4">
        <!-- Mobile header -->
        <div class="flex justify-between items-center lg:hidden mb-4">
          <span class="bebas tracking-widest" style="font-size:1.2rem;">Фільтри</span>
          <button onclick="toggleAside(false)" class="w-8 h-8 rounded-lg flex items-center justify-center"
                  style="background:var(--surface2);color:var(--text2);">
            <i class="fa-solid fa-xmark text-sm"></i>
          </button>
        </div>

        <!-- Category search -->
        <div class="mb-4">
          <div class="sec-title mb-2">Категорії</div>
          <input id="catSearch" type="text" oninput="filterCatList()" placeholder="Пошук категорії..."
                 class="w-full px-3 py-2 text-xs mb-2">
          <div id="categoryList" class="overflow-y-auto cscroll space-y-0.5 pr-0.5" style="max-height:38vh;"></div>
        </div>

        <!-- Price -->
        <div class="mb-4">
          <div class="sec-title mb-2">Ціна (₴)</div>
          <div class="flex gap-2">
            <input id="minPrice" type="number" oninput="performSearch()" placeholder="Від" class="w-1/2 px-3 py-2 text-xs font-bold">
            <input id="maxPrice" type="number" oninput="performSearch()" placeholder="До"  class="w-1/2 px-3 py-2 text-xs font-bold">
          </div>
        </div>

        <!-- Sort -->
        <div class="mb-4">
          <div class="sec-title mb-2">Сортування</div>
          <select id="sortSelect" onchange="performSearch()" class="w-full px-3 py-2 text-xs font-bold">
            <option value="default">За замовчуванням</option>
            <option value="price_asc">Ціна ↑</option>
            <option value="price_desc">Ціна ↓</option>
            <option value="name_asc">Назва А→Я</option>
            <option value="name_desc">Назва Я→А</option>
          </select>
        </div>

        <!-- Reset -->
        <button onclick="resetFilters()" class="w-full py-2 rounded-xl text-xs font-bold transition-all hover:text-red-500"
                style="background:var(--surface2);color:var(--text2);border:1px solid var(--border);">
          <i class="fa-solid fa-rotate-left mr-1"></i> Скинути фільтри
        </button>
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <main class="flex-1 min-w-0">

      <!-- Skeleton (visible immediately) -->
      <div id="skeletonGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 mb-5"></div>

      <!-- Info bar -->
      <div id="infoBar" class="hidden flex items-center justify-between mb-4">
        <span id="resultsCount" class="sec-title"></span>
      </div>

      <!-- Featured -->
      <div id="featuredSection"></div>

      <!-- Product grid -->
      <div id="productGrid"></div>
      <div id="pagination" class="mt-10 flex flex-wrap items-center justify-center gap-2 pb-8"></div>
    </main>
  </div>
</div>

<!-- ═══ CART ═══ -->
<div id="cartOverlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/50 z-[100] hidden backdrop-blur-sm"></div>
<div id="cartSidebar" class="fixed top-0 right-0 h-full w-full z-[110] translate-x-full transition-transform duration-300 flex flex-col shadow-2xl" style="max-width:420px;">

  <!-- Header -->
  <div class="p-4 flex justify-between items-center shrink-0" style="border-bottom:1px solid var(--border);">
    <div>
      <div class="bebas tracking-widest" style="font-size:1.4rem;">Кошик</div>
      <div class="sec-title mt-0.5">Управління замовленням</div>
    </div>
    <button onclick="toggleCart(false)" class="w-8 h-8 rounded-lg flex items-center justify-center hover:text-red-500 transition-all"
            style="background:var(--surface2);color:var(--text2);">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  </div>

  <!-- Global margin -->
  <div class="px-4 py-2.5 flex items-center gap-2 shrink-0" style="border-bottom:1px solid var(--border);background:var(--surface2);">
    <div class="sec-title shrink-0">Маржа:</div>
    <input id="globalMargin" type="number" value="20" min="0" max="999" class="w-16 px-2 py-1 text-xs font-bold text-center">
    <span class="text-xs font-bold" style="color:var(--text2);">%</span>
    <button onclick="applyGlobalMargin()" class="ml-auto px-3 py-1.5 rounded-lg text-xs font-black text-white transition-all hover:opacity-80"
            style="background:var(--accent);">Застосувати</button>
  </div>

  <!-- Items -->
  <div id="cartItems" class="flex-1 overflow-y-auto p-3 space-y-3 cscroll" style="background:var(--surface2);"></div>

  <!-- Footer -->
  <div class="p-4 shrink-0" style="border-top:1px solid var(--border);">
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-2 mb-3">
      <div class="rounded-xl p-2.5 text-center" style="background:var(--surface2);">
        <div class="sec-title mb-1">Закуп</div>
        <div id="cartCost" class="text-sm font-black">0 ₴</div>
      </div>
      <div class="rounded-xl p-2.5 text-center" style="background:var(--surface2);">
        <div class="sec-title mb-1">Продаж</div>
        <div id="cartTotal" class="text-sm font-black">0 ₴</div>
      </div>
      <div class="rounded-xl p-2.5 text-center" style="background:#ecfdf5;">
        <div class="sec-title mb-1" style="color:#059669;">Прибуток</div>
        <div id="cartProfit" class="text-sm font-black" style="color:#059669;">0 ₴</div>
      </div>
    </div>

    <!-- Checkout toggle -->
    <button onclick="toggleCheckout()" id="checkoutToggleBtn"
            class="w-full py-3 rounded-xl text-sm font-black text-white mb-3 flex items-center justify-center gap-2 transition-all hover:opacity-90"
            style="background:var(--accent);">
      <i class="fa-solid fa-clipboard-list"></i> Оформити замовлення
    </button>

    <!-- Checkout form -->
    <div id="checkoutForm">
      <div class="space-y-2 mb-3">
        <input id="clientName"    type="text"  placeholder="Ім'я клієнта"          class="w-full px-3 py-2.5 text-sm">
        <input id="clientPhone"   type="tel"   placeholder="Телефон (+38...)"       class="w-full px-3 py-2.5 text-sm">
        <input id="clientCity"    type="text"  placeholder="Місто + відділення НП"  class="w-full px-3 py-2.5 text-sm">
        <select id="paymentType"  class="w-full px-3 py-2.5 text-sm font-bold">
          <option>Накладений платіж</option>
          <option>Передоплата</option>
          <option>Карткою при отриманні</option>
        </select>
        <textarea id="clientComment" placeholder="Коментар (необов'язково)" rows="2"
                  class="w-full px-3 py-2.5 text-sm resize-none"></textarea>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="sendOrder('viber')" class="py-3 rounded-xl text-xs font-black text-white flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
                style="background:#7360f2;">
          <i class="fa-brands fa-viber"></i> Viber
        </button>
        <button onclick="sendOrder('telegram')" class="py-3 rounded-xl text-xs font-black text-white flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
                style="background:#29b6f6;">
          <i class="fa-brands fa-telegram"></i> Telegram
        </button>
        <button onclick="sendOrder('copy')" class="py-3 rounded-xl text-xs font-black flex items-center justify-center gap-1.5 transition-all hover:opacity-80"
                style="background:var(--surface2);color:var(--text);border:1px solid var(--border);">
          <i class="fa-solid fa-copy"></i> Копія
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="productModal">
  <div class="w-full rounded-2xl overflow-hidden relative flex flex-col md:flex-row" style="max-width:900px;max-height:92vh;background:var(--surface);">
    <button onclick="closeModal()" class="absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center z-10 shadow-lg"
            style="background:var(--surface);color:var(--text);">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>

    <!-- Image side -->
    <div class="w-full md:w-5/12 flex items-center justify-center p-6 shrink-0" style="background:var(--surface2);min-height:260px;">
      <img id="modalImg" src="" alt="" class="max-w-full object-contain drop-shadow-lg" style="max-height:360px;">
    </div>

    <!-- Info side -->
    <div class="w-full md:w-7/12 flex flex-col overflow-hidden">
      <div class="p-5 flex-1 overflow-y-auto cscroll">
        <div class="flex flex-wrap gap-1.5 mb-3">
          <span id="modalVendorBadge" class="text-[10px] font-black uppercase px-2.5 py-1 rounded-full" style="background:var(--surface2);color:var(--accent);"></span>
          <span id="modalIdBadge"     class="text-[10px] font-black uppercase px-2.5 py-1 rounded-full" style="background:var(--surface2);color:var(--text2);"></span>
        </div>
        <h2 id="modalName"  class="text-base font-black uppercase leading-snug mb-2" style="color:var(--text);"></h2>
        <div id="modalPrice" class="bebas mb-4" style="font-size:2rem;letter-spacing:.05em;color:var(--text);"></div>

        <!-- Tabs -->
        <div class="flex gap-0 mb-3" style="border-bottom:1px solid var(--border);">
          <button onclick="modalTab('desc')"   id="tabDesc"   class="tab-btn active">Опис</button>
          <button onclick="modalTab('params')" id="tabParams" class="tab-btn">Характеристики</button>
        </div>
        <div id="tabDescContent"   class="desc-content text-sm leading-relaxed overflow-y-auto cscroll" style="max-height:200px;color:var(--text2);"></div>
        <div id="tabParamsContent" class="hidden overflow-y-auto cscroll" style="max-height:200px;">
          <table id="paramsTable" class="ptable w-full"></table>
        </div>
      </div>

      <!-- Modal footer -->
      <div class="p-4 flex gap-2 shrink-0" style="border-top:1px solid var(--border);">
        <button onclick="copyModalDesc()" class="px-4 py-2.5 rounded-xl text-xs font-black flex items-center gap-1.5 transition-all hover:opacity-70"
                style="background:var(--surface2);color:var(--text);border:1px solid var(--border);">
          <i class="fa-solid fa-copy"></i> Копіювати
        </button>
        <button id="modalAddBtn" class="flex-1 py-2.5 rounded-xl text-sm font-black text-white flex items-center justify-center gap-2 transition-all hover:opacity-80"
                style="background:var(--text);">
          <i class="fa-solid fa-bag-shopping"></i> До кошика
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───
let allProducts=[], categories=[], cart=JSON.parse(localStorage.getItem('utrade_v9'))||[];
let currentVendor='all', currentCategory='all', currentPage=1, itemsPerPage=20;
let checkoutOpen=false, currentModalProduct=null;

// ─── VENDOR DETECTION ───
function getVendorName(url){
  if(!url) return 'Інше';
  const u=url.toLowerCase();
  if(u.includes('prom.st')||u.includes('prom.ua')) return 'HUGO';
  if(u.includes('opt-drop.com'))     return 'OPT-DROP';
  if(u.includes('royaltoys.com.ua')) return 'ROYALTOYS';
  if(u.includes('kievopt.com.ua'))   return 'KIEVOPT';
  if(u.includes('shkatulka.in.ua'))  return 'SHKATULKA';
  return 'Інше';
}

// ─── THEME ───
function toggleTheme(){
  const dark=document.body.getAttribute('data-theme')!=='dark';
  document.body.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeIcon').className=dark?'fa-solid fa-sun text-sm':'fa-solid fa-moon text-sm';
  localStorage.setItem('utrade_theme',dark?'dark':'light');
}
(function(){
  if(localStorage.getItem('utrade_theme')==='dark'){
    document.body.setAttribute('data-theme','dark');
    document.getElementById('themeIcon').className='fa-solid fa-sun text-sm';
  }
})();

// ─── TOAST ───
function showToast(msg='✓ Додано до кошика'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── SKELETON ───
function buildSkeleton(){
  const g=document.getElementById('skeletonGrid');
  g.className='grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 mb-5';
  let h='';
  for(let i=0;i<8;i++) h+=`
    <div class="rounded-2xl p-3" style="background:var(--surface);border:1px solid var(--border);">
      <div class="sk aspect-square rounded-xl mb-3"></div>
      <div class="sk h-3 rounded mb-2" style="width:75%"></div>
      <div class="sk h-3 rounded mb-4" style="width:50%"></div>
      <div class="sk h-9 rounded-xl"></div>
    </div>`;
  g.innerHTML=h;
}

// ─── INIT ───
async function init(){
  buildSkeleton();
  try{
    const res=await fetch('Masterevanew.xml');
    const text=await res.text();
    const xml=new DOMParser().parseFromString(text,'text/xml');

    categories=Array.from(xml.getElementsByTagName('category')).map(c=>({
      id:c.getAttribute('id'), name:c.textContent.trim()
    }));

    allProducts=Array.from(xml.getElementsByTagName('offer')).map(o=>{
      const img=(o.getElementsByTagName('picture')[0]?.textContent||'').trim();
      const name=(
        o.getElementsByTagName('name_ua')[0]?.textContent||
        o.getElementsByTagName('name')[0]?.textContent||'Без назви'
      ).trim();

      // Parse <param> characteristics
      const params=Array.from(o.getElementsByTagName('param')).map(p=>({
        name: p.getAttribute('name')||p.getAttribute('paramname')||'',
        value: p.textContent.trim()
      })).filter(p=>p.name&&p.value);

      // Description
      let desc=(o.getElementsByTagName('description')[0]?.textContent||'').trim();
      if(desc&&!/<[a-z][\s\S]*>/i.test(desc)) desc=desc.replace(/\n/g,'<br>');

      return{
        id:o.getAttribute('id'),
        name:name.toUpperCase(),
        price:Math.round(parseFloat(o.getElementsByTagName('price')[0]?.textContent||0)),
        img, vendor:getVendorName(img),
        catId:o.getElementsByTagName('categoryId')[0]?.textContent||'',
        desc, params
      };
    });

    document.getElementById('skeletonGrid').remove();
    renderVendorBar();
    renderCatList();
    renderFeatured();
    performSearch();
    updateCartUI();

  }catch(e){
    document.getElementById('skeletonGrid').innerHTML=
      '<p class="col-span-full text-center py-20 font-black" style="color:var(--red);">⚠️ Помилка завантаження XML. Перевірте файл Masterevanew.xml</p>';
    console.error(e);
  }
}

// ─── VENDOR BAR ───
function renderVendorBar(){
  const vendors=['all',...new Set(allProducts.map(p=>p.vendor))];
  document.getElementById('vendorBar').innerHTML=vendors.map(v=>{
    const cnt=v==='all'?allProducts.length:allProducts.filter(p=>p.vendor===v).length;
    return`<button onclick="filterByVendor('${v}')" class="vbtn${currentVendor===v?' active':''}">
      ${v==='all'?'Всі':v} <span style="opacity:.55">${cnt}</span>
    </button>`;
  }).join('');
}

function filterByVendor(v){
  currentVendor=v; currentCategory='all'; currentPage=1;
  renderVendorBar(); renderCatList();
  document.getElementById('featuredSection').innerHTML='';
  performSearch();
}

// ─── CATEGORIES (dynamic by vendor) ───
function renderCatList(){
  const vp=currentVendor==='all'?allProducts:allProducts.filter(p=>p.vendor===currentVendor);
  const activeCatIds=new Set(vp.map(p=>p.catId));
  const visible=categories.filter(c=>activeCatIds.has(c.id));

  document.getElementById('categoryList').innerHTML=
    `<button onclick="selectCat('all')" class="cbtn${currentCategory==='all'?' active':''}">Всі категорії</button>`+
    visible.map(c=>{
      const cnt=vp.filter(p=>p.catId===c.id).length;
      return`<button onclick="selectCat('${c.id}')" class="cbtn${currentCategory===c.id?' active':''}" data-catname="${c.name.toLowerCase()}">
        ${c.name} <span style="opacity:.5">${cnt}</span>
      </button>`;
    }).join('');
}

function selectCat(id){
  currentCategory=id; currentPage=1;
  renderCatList(); performSearch();
  if(window.innerWidth<1024) toggleAside(false);
}

function filterCatList(){
  const q=document.getElementById('catSearch').value.toLowerCase();
  document.querySelectorAll('#categoryList .cbtn[data-catname]').forEach(b=>{
    b.classList.toggle('hidden',!b.dataset.catname.includes(q));
  });
}

// ─── FEATURED ───

    <div class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-1 h-5 rounded-full" style="background:var(--accent);"></div>
        <span class="bebas tracking-widest" style="font-size:1.3rem;">Нові надходження</span>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3">
        ${picks.map((p,i)=>`
          <div class="feat-card fade-up" style="animation-delay:${i*35}ms" onclick="openModal('${p.id}')">
            <div class="aspect-square flex items-center justify-center p-3" style="background:var(--surface2);">
              <img src="${p.img}" class="max-w-full max-h-full object-contain" loading="lazy"
                   onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>'">
            </div>
            <div class="p-3">
              <div class="text-[8px] font-black uppercase mb-1" style="color:var(--accent);">${p.vendor}</div>
              <div class="text-[10px] font-bold uppercase leading-tight mb-2 line-clamp-2" style="color:var(--text);">${p.name}</div>
              <div class="flex justify-between items-center">
                <span class="bebas" style="font-size:1rem;color:var(--text);">${p.price} ₴</span>
                <button onclick="event.stopPropagation();addToCart('${p.id}')"

                  style="background:var(--text);">+</button>

      <div class="w-1 h-5 rounded-full" style="background:var(--accent);"></div>
      <span class="bebas tracking-widest" style="font-size:1.3rem;">Всі товари</span>
    </div>`;
}

// ─── SEARCH / FILTER / SORT ───
function performSearch(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const minP=parseFloat(document.getElementById('minPrice').value)||0;
  const maxP=parseFloat(document.getElementById('maxPrice').value)||9999999;
  const sort=document.getElementById('sortSelect').value;

  let filtered=allProducts.filter(p=>{
    if(currentVendor!=='all'&&p.vendor!==currentVendor) return false;
    if(currentCategory!=='all'&&p.catId!==currentCategory) return false;
    if(p.price<minP||p.price>maxP) return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.id.includes(q)) return false;
    return true;
  });

  if(sort==='price_asc')  filtered.sort((a,b)=>a.price-b.price);
  if(sort==='price_desc') filtered.sort((a,b)=>b.price-a.price);
  if(sort==='name_asc')   filtered.sort((a,b)=>a.name.localeCompare(b.name));
  if(sort==='name_desc')  filtered.sort((a,b)=>b.name.localeCompare(a.name));

  const total=filtered.length;
  const start=(currentPage-1)*itemsPerPage;
  renderGrid(filtered.slice(start,start+itemsPerPage));
  renderPagination(Math.ceil(total/itemsPerPage));

  document.getElementById('resultsCount').textContent=`Знайдено: ${total} товарів`;
  document.getElementById('infoBar').classList.toggle('hidden',total===0);
}

function resetFilters(){
  currentVendor='all'; currentCategory='all'; currentPage=1;
  document.getElementById('searchInput').value='';
  document.getElementById('minPrice').value='';
  document.getElementById('maxPrice').value='';
  document.getElementById('sortSelect').value='default';
  renderVendorBar(); renderCatList(); performSearch();
}

// ─── GRID ───
const PLACEHOLDER="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>";

function renderGrid(list){
  const grid=document.getElementById('productGrid');
  if(!list.length){
    grid.innerHTML=`<div class="col-span-full text-center py-20 font-black uppercase" style="color:var(--text2);opacity:.3;">Товари не знайдено</div>`;
    return;
  }
  grid.className='grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4';
  const margin=parseInt(document.getElementById('globalMargin').value)||20;
  grid.innerHTML=list.map((p,i)=>{
    const saleP=Math.round(p.price*(1+margin/100));
    const prof=saleP-p.price;
    return`<div class="pcard p-3 cursor-pointer flex flex-col fade-up" style="animation-delay:${Math.min(i,8)*30}ms" onclick="openModal('${p.id}')">
      <div class="aspect-square rounded-xl mb-3 flex items-center justify-center p-3 relative overflow-hidden" style="background:var(--surface2);">
        <img src="${p.img}" class="max-w-full max-h-full object-contain mix-blend-multiply" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
        <span class="absolute top-2 left-2 text-[7px] font-black uppercase px-1.5 py-0.5 rounded-full" style="background:var(--surface);color:var(--accent);border:1px solid var(--border);">${p.vendor}</span>
      </div>
      <h3 class="text-[10px] font-bold leading-tight mb-2 uppercase line-clamp-2" style="color:var(--text);min-height:2.2rem;">${p.name}</h3>
      <div class="mt-auto flex justify-between items-center pt-2" style="border-top:1px solid var(--border);" onclick="event.stopPropagation()">
        <div>
          <div class="bebas" style="font-size:1.1rem;color:var(--text);">${p.price} ₴</div>
          <div class="text-[9px] font-bold" style="color:var(--green);">+${prof} ₴</div>
        </div>
        <button onclick="addToCart('${p.id}')"
          class="w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm transition-all hover:opacity-80 active:scale-90"
          style="background:var(--text);">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ─── PAGINATION ───
function renderPagination(total){
  const w=document.getElementById('pagination');
  if(total<=1){w.innerHTML='';return;}
  let h='';
  for(let i=1;i<=total;i++){
    if(i===1||i===total||(i>=currentPage-1&&i<=currentPage+1)){
      h+=`<button onclick="currentPage=${i};performSearch();window.scrollTo({top:0,behavior:'smooth'})"
            class="pbtn${currentPage===i?' active':''}">${i}</button>`;
    }else if(i===currentPage-2||i===currentPage+2){
      h+=`<span style="color:var(--text2);font-weight:800;">…</span>`;
    }
  }
  w.innerHTML=h;
}

// ─── MODAL ───
function openModal(id){
  const p=allProducts.find(x=>x.id===id);
  if(!p) return;
  currentModalProduct=p;

  document.getElementById('modalImg').src=p.img||PLACEHOLDER;
  document.getElementById('modalImg').onerror=function(){this.src=PLACEHOLDER;};
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalPrice').textContent=p.price+' ₴';
  document.getElementById('modalVendorBadge').textContent=p.vendor;
  document.getElementById('modalIdBadge').textContent='ID: '+p.id;
  document.getElementById('tabDescContent').innerHTML=p.desc||'<span style="opacity:.4">Опис відсутній</span>';

  const tbl=document.getElementById('paramsTable');
  if(p.params&&p.params.length){
    tbl.innerHTML=p.params.map(pr=>`<tr><td>${pr.name}</td><td style="font-weight:700;">${pr.value}</td></tr>`).join('');
  }else{
    tbl.innerHTML='<tr><td colspan="2" style="opacity:.35;text-align:center;padding:16px;font-size:.75rem;">Характеристики відсутні</td></tr>';
  }

  document.getElementById('modalAddBtn').onclick=()=>{addToCart(id);closeModal();};
  modalTab('desc');
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow='';
}

function modalTab(tab){
  const isDesc=tab==='desc';
  document.getElementById('tabDescContent').classList.toggle('hidden',!isDesc);
  document.getElementById('tabParamsContent').classList.toggle('hidden',isDesc);
  document.getElementById('tabDesc').classList.toggle('active',isDesc);
  document.getElementById('tabParams').classList.toggle('active',!isDesc);
}

function copyModalDesc(){
  const p=currentModalProduct; if(!p) return;
  const tmp=document.createElement('div');
  tmp.innerHTML=p.desc;
  let text=p.name+'\n\nЦіна: '+p.price+' ₴\n\n'+(tmp.textContent||tmp.innerText||'');
  if(p.params&&p.params.length){
    text+='\n\nХарактеристики:\n';
    p.params.forEach(pr=>{text+=pr.name+': '+pr.value+'\n';});
  }
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Опис скопійовано!'));
}

// ─── CART ───
function addToCart(id){
  const existing=cart.find(i=>i.id===id);
  if(existing){existing.count++;} 
  else{
    const p=allProducts.find(x=>x.id===id); if(!p) return;
    const margin=parseInt(document.getElementById('globalMargin').value)||20;
    cart.push({id:p.id,name:p.name,price:p.price,img:p.img,vendor:p.vendor,
               salePrice:Math.round(p.price*(1+margin/100)),count:1});
  }
  saveCart(); updateCartUI(); showToast();
}

function applyGlobalMargin(){
  const margin=parseInt(document.getElementById('globalMargin').value)||20;
  cart.forEach(item=>{item.salePrice=Math.round(item.price*(1+margin/100));});
  saveCart(); updateCartUI();
}

function inlineUpdate(id,val){
  const item=cart.find(i=>i.id===id);
  if(item){item.salePrice=parseInt(val)||0; saveCart(); updateCartUI();}
}

function updateCount(id,delta){
  const item=cart.find(i=>i.id===id);
  if(item){item.count=Math.max(1,item.count+delta); saveCart(); updateCartUI();}
}

function removeFromCart(id){
  cart=cart.filter(i=>i.id!==id); saveCart(); updateCartUI();
}

function saveCart(){localStorage.setItem('utrade_v9',JSON.stringify(cart));}

function updateCartUI(){
  const el=document.getElementById('cartItems');
  let cost=0,total=0,profit=0;

  if(!cart.length){
    el.innerHTML=`<div class="py-20 text-center font-black uppercase" style="color:var(--text2);opacity:.25;">Кошик порожній</div>`;
  }else{
    el.innerHTML=cart.map(p=>{
      const pP=(p.salePrice-p.price)*p.count;
      const pT=p.salePrice*p.count;
      cost+=p.price*p.count; total+=pT; profit+=pP;
      const pc=pP>=0?'var(--green)':'var(--red)';
      return`<div class="rounded-xl p-3 relative" style="background:var(--surface);border:1px solid var(--border);">
        <button onclick="removeFromCart('${p.id}')" class="absolute top-2.5 right-2.5 w-6 h-6 rounded-lg flex items-center justify-center text-xs transition-all hover:text-red-500"
                style="background:var(--surface2);color:var(--text2);">✕</button>
        <div class="flex gap-2.5 items-center mb-2.5 pr-7">
          <img src="${p.img}" class="w-10 h-10 object-contain rounded-lg shrink-0" style="background:var(--surface2);"
               onerror="this.src='${PLACEHOLDER}'">
          <div class="min-w-0">
            <div class="text-[10px] font-black truncate uppercase" style="color:var(--text);">${p.name}</div>
            <div class="text-[9px] font-bold" style="color:var(--text2);">Закуп: ${p.price} ₴ · ${p.vendor}</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div class="rounded-lg p-2 text-center" style="background:var(--surface2);">
            <div class="sec-title mb-1">Ціна продажу</div>
            <input type="number" value="${p.salePrice}" oninput="inlineUpdate('${p.id}',this.value)"
              class="w-full text-center text-sm font-black rounded-lg px-1 py-0.5"
              style="background:transparent;border:none;color:var(--text);">
          </div>
          <div class="rounded-lg p-2 text-center" style="background:var(--surface2);">
            <div class="sec-title mb-1">Кількість</div>
            <div class="flex items-center justify-center gap-2 mt-1">
              <button onclick="updateCount('${p.id}',-1)" class="w-6 h-6 rounded-md text-xs font-black" style="background:var(--border);color:var(--text);">−</button>
              <span class="text-sm font-black" style="color:var(--text);">${p.count}</span>
              <button onclick="updateCount('${p.id}',1)"  class="w-6 h-6 rounded-md text-xs font-black" style="background:var(--border);color:var(--text);">+</button>
            </div>
          </div>
        </div>
        <div class="mt-1.5 text-right text-[9px] font-black" style="color:${pc};">
          ${pP>=0?'+':''}${pP} ₴ прибуток · разом ${pT} ₴
        </div>
      </div>`;
    }).join('');
  }

  const cnt=cart.reduce((s,i)=>s+i.count,0);
  const cc=document.getElementById('cartCount');
  cc.textContent=cnt;
  cc.classList.toggle('hidden',cnt===0);
  cc.classList.toggle('flex',cnt>0);
  document.getElementById('cartCost').textContent=cost+' ₴';
  document.getElementById('cartTotal').textContent=total+' ₴';
  document.getElementById('cartProfit').textContent=(profit>=0?'+':'')+profit+' ₴';
}

// ─── CHECKOUT ───
function toggleCheckout(){
  checkoutOpen=!checkoutOpen;
  document.getElementById('checkoutForm').classList.toggle('open',checkoutOpen);
  document.getElementById('checkoutToggleBtn').innerHTML=checkoutOpen
    ?'<i class="fa-solid fa-xmark mr-1"></i> Закрити форму'
    :'<i class="fa-solid fa-clipboard-list mr-1"></i> Оформити замовлення';
}

function buildOrderText(){
  const name    =document.getElementById('clientName').value.trim()||'Не вказано';
  const phone   =document.getElementById('clientPhone').value.trim()||'Не вказано';
  const city    =document.getElementById('clientCity').value.trim()||'Не вказано';
  const payment =document.getElementById('paymentType').value;
  const comment =document.getElementById('clientComment').value.trim();
  let cost=0,total=0,profit=0,lines='';
  cart.forEach((p,i)=>{
    const t=p.salePrice*p.count;
    cost+=p.price*p.count; total+=t; profit+=(p.salePrice-p.price)*p.count;
    lines+=`${i+1}. ${p.name}\n   ${p.count} шт. × ${p.salePrice} ₴ = ${t} ₴\n`;
  });
  let msg=`🚀 НОВЕ ЗАМОВЛЕННЯ — UTRADE\n━━━━━━━━━━━━━━━━━━━━\n`;
  msg+=`👤 ${name}\n📞 ${phone}\n📦 ${city}\n💳 ${payment}\n`;
  if(comment) msg+=`💬 ${comment}\n`;
  msg+=`━━━━━━━━━━━━━━━━━━━━\n${lines}━━━━━━━━━━━━━━━━━━━━\n`;
  msg+=`🛒 Закуп: ${cost} ₴\n💰 Продаж: ${total} ₴\n📈 Прибуток: +${profit} ₴`;
  return msg;
}

function sendOrder(channel){
  if(!cart.length){showToast('⚠️ Кошик порожній!');return;}
  const msg=buildOrderText();
  if(channel==='viber'){
    window.open(`viber://chat?number=%2B380666172764&draft=${encodeURIComponent(msg)}`);
  }else if(channel==='telegram'){
    window.open(`https://t.me/your_bot?text=${encodeURIComponent(msg)}`);
  }else{
    navigator.clipboard.writeText(msg).then(()=>showToast('📋 Замовлення скопійовано!'));
  }
}

// ─── CSV EXPORT ───
function exportCSV(){
  const margin=parseInt(document.getElementById('globalMargin').value)||20;
  const q=document.getElementById('searchInput').value.toLowerCase();
  const minP=parseFloat(document.getElementById('minPrice').value)||0;
  const maxP=parseFloat(document.getElementById('maxPrice').value)||9999999;
  const filtered=allProducts.filter(p=>{
    if(currentVendor!=='all'&&p.vendor!==currentVendor) return false;
    if(currentCategory!=='all'&&p.catId!==currentCategory) return false;
    if(p.price<minP||p.price>maxP) return false;
    if(q&&!p.name.toLowerCase().includes(q)) return false;
    return true;
  });
  const rows=[['ID','Назва','Постачальник','Категорія','Закуп (₴)','Продаж (₴)','Прибуток (₴)']];
  filtered.forEach(p=>{
    const cat=categories.find(c=>c.id===p.catId)?.name||'';
    const saleP=Math.round(p.price*(1+margin/100));
    rows.push([p.id,p.name,p.vendor,cat,p.price,saleP,saleP-p.price]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`utrade_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('📊 CSV завантажено!');
}

// ─── UI HELPERS ───
function toggleAside(show){
  document.getElementById('sidePanel').classList.toggle('aside-open',show);
  document.getElementById('asideOverlay').classList.toggle('hidden',!show);
}
function toggleCart(show){
  document.getElementById('cartSidebar').classList.toggle('cart-open',show);
  document.getElementById('cartOverlay').classList.toggle('hidden',!show);
}

// Close modal on backdrop click
document.getElementById('productModal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});
// Escape key
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});

// Start
init();
