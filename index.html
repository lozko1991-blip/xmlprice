<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTRADE | Швидкий Склад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .cart-sidebar { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="antialiased">

<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-bolt text-xl"></i></div>
            <h1 class="font-black text-slate-900 leading-none text-xl tracking-tighter hidden sm:block">UTRADE</h1>
        </div>
        <div class="flex-1 max-w-lg relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Пошук у XML..." class="w-full bg-slate-100 border-none rounded-2xl pl-11 pr-4 py-3 outline-none text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center gap-4">
            <a href="tel:+380666172764" class="hidden md:block text-sm font-black text-slate-700 hover:text-blue-600">+38 066 617 27 64</a>
            <button onclick="toggleCart(true)" class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center relative shadow-lg hover:scale-105 transition-all">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
            </button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-6">
    <div id="loader" class="flex flex-col items-center py-20 text-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-400 font-bold text-xs uppercase tracking-widest">Вибираємо 100 товарів з 32,000+...</p>
    </div>
    <div id="productGrid" class="product-grid"></div>
</main>

<div id="cartOverlay" onclick="toggleCart(false)" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] hidden"></div>
<div id="cartSidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[70] cart-sidebar shadow-2xl flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-slate-50">
        <h2 class="text-xl font-black uppercase tracking-tighter">Ваше замовлення</h2>
        <button onclick="toggleCart(false)" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"></div>
    <div class="p-6 border-t bg-slate-100/50">
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-slate-500 uppercase text-[10px]">Сума до сплати (з вашою націнкою)</span>
            <span id="cartTotal" class="text-3xl font-black text-blue-600">0 ₴</span>
        </div>
        <button onclick="checkoutViaViber()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all uppercase text-xs tracking-wider flex items-center justify-center gap-3">
            <i class="fa-brands fa-viber text-lg"></i> ОФОРМИТИ ЗАМОВЛЕННЯ
        </button>
    </div>
</div>

<div id="productModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
    <div class="bg-white w-full max-w-5xl rounded-[3rem] overflow-hidden shadow-2xl relative max-h-[90vh] flex flex-col md:flex-row">
        <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center hover:text-red-500 transition-all z-10"><i class="fa-solid fa-xmark"></i></button>
        <div id="modalContent" class="flex flex-col md:flex-row w-full h-full overflow-y-auto custom-scrollbar"></div>
    </div>
</div>

<script>
    let allProducts = [], cart = JSON.parse(localStorage.getItem('utrade_cart_2.0')) || [];

    // Логіка розпізнавання постачальника
    function detectVendor(imgUrl) {
        if (!imgUrl) return "Склад";
        const url = imgUrl.toLowerCase();
        if (url.includes('prom.ua')) return "Hugo";
        if (url.includes('shkatulka')) return "Shkatulka";
        if (url.includes('opt-drop')) return "Opt-Drop";
        if (url.includes('lugi')) return "Lugi";
        if (url.includes('dropom')) return "Dropom";
        if (url.includes('kievopt')) return "Kievopt";
        if (url.includes('royaltoys')) return "RoyalToys";
        return "Склад";
    }

    async function init() {
        updateCartUI();
        try {
            // Вказуємо правильний файл — Masterevanew.xml
            const res = await fetch('Masterevanew.xml');
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const offers = xml.getElementsByTagName("offer");

            // Беремо 100 рандомних товарів
            const totalOffers = offers.length;
            const randomIndices = new Set();
            while(randomIndices.size < Math.min(100, totalOffers)) {
                randomIndices.add(Math.floor(Math.random() * totalOffers));
            }

            allProducts = Array.from(randomIndices).map(idx => {
                const o = offers[idx];
                const img = o.getElementsByTagName('picture')[0]?.textContent || "";
                
                // Характеристики
                const params = Array.from(o.getElementsByTagName('param')).map(p => ({
                    name: p.getAttribute('name'),
                    val: p.textContent
                }));

                return {
                    id: o.getAttribute('id'),
                    name: (o.getElementsByTagName('name_ua')[0]?.textContent || o.getElementsByTagName('name')[0]?.textContent).toUpperCase(),
                    price: parseFloat(o.getElementsByTagName('price')[0]?.textContent || 0),
                    img: img,
                    catId: o.getElementsByTagName('categoryId')[0]?.textContent,
                    vendor: detectVendor(img),
                    stock: o.getElementsByTagName('stock_quantity')[0]?.textContent || o.getAttribute('quantity') || "є",
                    desc: o.getElementsByTagName('description')[0]?.textContent || "",
                    params: params
                };
            });

            document.getElementById('loader').classList.add('hidden');
            renderProducts();

        } catch (e) { 
            console.error("Критична помилка завантаження XML:", e);
            document.getElementById('loader').innerHTML = '<p class="text-red-500 font-bold">Помилка завантаження складу. Оновіть сторінку.</p>';
        }
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = allProducts.map(p => `
            <div class="bg-white p-4 rounded-[2rem] border border-white hover:border-blue-100 hover:shadow-2xl transition-all group cursor-pointer flex flex-col" onclick="openModal('${p.id}')">
                <div class="aspect-square bg-slate-50 rounded-2xl mb-4 overflow-hidden p-2 relative">
                    <img src="${p.img}" class="w-full h-full object-contain mix-blend-multiply group-hover:scale-110 transition-all duration-500" loading="lazy">
                    <div class="absolute top-2 left-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[8px] font-black shadow-sm uppercase text-blue-600 border border-blue-50 tracking-tighter">${p.vendor}</div>
                </div>
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">ID: ${p.id}</p>
                    <span class="text-[9px] font-black text-green-600 bg-green-50 px-2 py-0.5 rounded-full">STOCK: ${p.stock}</span>
                </div>
                <h3 class="text-[11px] font-bold text-slate-800 line-clamp-2 h-8 mb-3 leading-tight uppercase tracking-tight">${p.name}</h3>
                <div class="mt-auto flex justify-between items-center" onclick="event.stopPropagation()">
                    <span class="text-md font-black text-slate-900">${Math.round(p.price)} ₴</span>
                    <button onclick="addToCart('${p.id}')" class="w-9 h-9 bg-slate-100 text-slate-900 rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fa-solid fa-plus text-xs"></i></button>
                </div>
            </div>
        `).join('');
    }

    function openModal(id) {
        const p = allProducts.find(x => x.id === id);
        if(!p) return;
        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div class="w-full md:w-1/2 bg-slate-50 p-8 flex items-center justify-center">
                <img src="${p.img}" class="max-w-full max-h-[450px] object-contain drop-shadow-2xl mix-blend-multiply">
            </div>
            <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col">
                <div class="flex-1 overflow-y-auto custom-scrollbar pr-4">
                    <div class="flex gap-2 mb-6">
                        <span class="px-3 py-1 bg-blue-600 text-white text-[10px] font-black rounded-full uppercase tracking-tighter italic">Постачальник: ${p.vendor}</span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-500 text-[10px] font-black rounded-full uppercase">ID: ${p.id}</span>
                    </div>
                    <h2 class="text-2xl font-black text-slate-900 leading-tight mb-4 uppercase tracking-tighter">${p.name}</h2>
                    <div class="text-3xl font-black text-blue-600 mb-6">${Math.round(p.price)} ₴ <span class="text-sm text-slate-400 font-bold ml-2">STOCK: ${p.stock}</span></div>
                    
                    <div class="space-y-8">
                        <div>
                            <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest border-b-2 border-blue-600 inline-block mb-4">Характеристики</h4>
                            <div class="grid grid-cols-1 gap-y-2">
                                ${p.params.map(pr => `<div class="flex justify-between text-xs border-b border-slate-50 pb-1"><span class="text-slate-400 font-medium">${pr.name}:</span><span class="font-bold text-slate-700">${pr.val}</span></div>`).join('')}
                            </div>
                        </div>
                        <div>
                            <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest border-b-2 border-blue-600 inline-block mb-4">Про товар</h4>
                            <div class="text-sm text-slate-600 leading-relaxed space-y-4 prose-sm">${p.desc}</div>
                        </div>
                    </div>
                </div>
                <button onclick="addToCart('${p.id}'); closeModal();" class="mt-8 w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all flex items-center justify-center gap-3 shadow-xl">
                    <i class="fa-solid fa-cart-plus"></i> ДОДАТИ У КОШИК
                </button>
            </div>
        `;
        document.getElementById('productModal').classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    }

    // ЛОГІКА КОШИКА (З ДРОП-ЦІНОЮ)
    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        if(cart.find(i => i.id === id)) return alert('Вже у кошику');
        // Додаємо поле markup (націнка), за замовчуванням 200 грн
        cart.push({...p, markup: 200}); 
        localStorage.setItem('utrade_cart_2.0', JSON.stringify(cart));
        updateCartUI();
        toggleCart(true);
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        localStorage.setItem('utrade_cart_2.0', JSON.stringify(cart));
        updateCartUI();
    }

    function updateMarkup(id, value) {
        const item = cart.find(i => i.id === id);
        item.markup = parseFloat(value) || 0;
        localStorage.setItem('utrade_cart_2.0', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const count = document.getElementById('cartCount');
        const items = document.getElementById('cartItems');
        const total = document.getElementById('cartTotal');
        
        count.textContent = cart.length;
        count.classList.toggle('hidden', cart.length === 0);
        
        const cartTotalPrice = cart.reduce((sum, p) => sum + p.price + p.markup, 0);
        total.textContent = Math.round(cartTotalPrice) + ' ₴';
        
        items.innerHTML = cart.length ? cart.map(p => `
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col gap-3 relative">
                <button onclick="removeFromCart('${p.id}')" class="absolute top-2 right-2 text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can text-xs"></i></button>
                <div class="flex gap-4 items-center">
                    <img src="${p.img}" class="w-16 h-16 object-contain mix-blend-multiply bg-white rounded-xl">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-[10px] font-bold line-clamp-2 uppercase leading-tight pr-6">${p.name}</h4>
                        <div class="text-[10px] font-black text-slate-400 mt-1 uppercase">ID: ${p.id} | ${p.vendor}</div>
                    </div>
                </div>
                <div class="flex items-end justify-between gap-4 border-t pt-3">
                    <div class="flex-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 block">Ваша дроп-ціна (₴)</label>
                        <input type="number" value="${p.markup}" oninput="updateMarkup('${p.id}', this.value)" class="w-full p-2 bg-white rounded-lg border border-slate-200 text-sm font-bold outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="text-right flex-col flex shrink-0">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Фінал</span>
                        <span class="text-lg font-black text-slate-900">${Math.round(p.price + p.markup)} ₴</span>
                        <span class="text-[9px] text-slate-400 font-medium">База: ${Math.round(p.price)}₴</span>
                    </div>
                </div>
            </div>
        `).join('') : '<div class="text-center py-20 text-slate-400 font-bold italic">Кошик порожній...</div>';
    }

    function checkoutViaViber() {
        if(!cart.length) return;
        let msg = `🔥 ЗАМОВЛЕННЯ UTRADE 🔥\n\nКлієнт до сплати: ${document.getElementById('cartTotal').textContent}\n\nПозиції:\n`;
        cart.forEach(p => {
            msg += `▫️ ${p.name}\n🔹 ID: ${p.id}\n🔹 Ціна клієнта: ${Math.round(p.price + p.markup)}₴\n🔹 (Базова: ${Math.round(p.price)}₴ / Націнка: ${Math.round(p.markup)}₴)\n\n`;
        });
        window.open(`viber://chat?number=%2B380666172764&draft=${encodeURIComponent(msg)}`);
    }

    function toggleCart(show) {
        document.getElementById('cartSidebar').classList.toggle('open', show);
        document.getElementById('cartOverlay').classList.toggle('hidden', !show);
        document.body.classList.toggle('overflow-hidden', show);
    }

    function closeModal() { document.getElementById('productModal').classList.add('hidden'); document.body.classList.remove('overflow-hidden'); }
    function debounceSearch() { alert('Пошук у розробці для Швидкого Складу'); }

    init();
</script>
</body>
</html>
