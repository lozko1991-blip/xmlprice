<div class="hidden sm:block ml-4">
    <div id="lastUpdate" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
        Оновлення: завантаження...
    </div>
</div>

<script>
    // Використовуємо глобальні змінні для швидкості
    let products = [];
    let categories = {};

    async function init() {
        const updateEl = document.getElementById('lastUpdate');
        try {
            const res = await fetch('Masterevanew.xml');
            
            // Перевіряємо дату останньої модифікації файлу з заголовків сервера
            const lastMod = res.headers.get('Last-Modified');
            if(lastMod) {
                const date = new Date(lastMod);
                updateEl.textContent = `Оновлено: ${date.toLocaleTimeString('uk-UA')} ${date.toLocaleDateString('uk-UA')}`;
            }

            const text = await res.text();
            
            // Використовуємо setTimeout, щоб дати браузеру "дихнути" перед парсингом 80МБ
            setTimeout(() => {
                const xml = new DOMParser().parseFromString(text, "text/xml");
                
                // Швидкий збір категорій
                const catNodes = xml.getElementsByTagName("category");
                for (let i = 0; i < catNodes.length; i++) {
                    categories[catNodes[i].getAttribute('id')] = catNodes[i].textContent;
                }

                // Оптимізований збір товарів (тільки необхідні поля)
                const offerNodes = xml.getElementsByTagName("offer");
                const tempProducts = [];
                for (let i = 0; i < offerNodes.length; i++) {
                    const o = offerNodes[i];
                    tempProducts.push({
                        id: o.getAttribute('id'),
                        name: o.getElementsByTagName('name_ua')[0]?.textContent || o.getElementsByTagName('name')[0]?.textContent || "",
                        price: parseFloat(o.getElementsByTagName('price')[0]?.textContent || 0),
                        catId: o.getElementsByTagName('categoryId')[0]?.textContent,
                        image: o.getElementsByTagName('picture')[0]?.textContent || '',
                        desc: "" // Не вантажимо опис відразу, щоб зекономити пам'ять
                    });
                }
                products = tempProducts;

                setupUI();
                renderHome();
                document.getElementById('mainLoader').classList.add('hidden');
            }, 100);

        } catch (e) {
            updateEl.textContent = "Помилка завантаження";
            console.error("Критична помилка:", e);
        }
    }

    }
</script>
