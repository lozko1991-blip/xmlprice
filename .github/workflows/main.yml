name: Update XML Feed

on:
  schedule:
    - cron: '0 */4 * * *' # Автозапуск кожні 4 години
  workflow_dispatch:      # Цей рядок додає кнопку ручного запуску

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python process_xml.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add feed.xml
          git commit -m "Update feed.xml" || exit 0
          git push
