name: Master Eva Feed Update

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_master_feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Оновлено до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Оновлено до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run Master Eva Script
        run: python masterevaxml.py

      - name: Commit and push Masterevanew
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Masterevanew.xml
          git commit -m "Update Masterevanew.xml" || exit 0
          git push
